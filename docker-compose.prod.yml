version: "3.9"

services:
  frontend:
    image: buildai-frontend:latest
    ports:
      - "3000:3000"
    restart: always

  backend:
    image: buildai-backend:latest
    ports:
      - "8000:8000"
    restart: always

  worker:
    image: buildai-backend:latest
    command: celery -A app.workers.celery_app worker --loglevel=warning --concurrency=4
    restart: always

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

volumes:
  redis_data:
